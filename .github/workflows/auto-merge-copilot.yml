name: Auto-merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge if Copilot PR & CI green
    runs-on: ubuntu-latest
    steps:
      - name: Find Copilot PR and enable auto-merge
        run: |
          # Determine the branch based on event type
          if [ "${{ github.event_name }}" = "check_suite" ]; then
            BRANCH="${{ github.event.check_suite.head_branch }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
          else
            echo "Unknown event: ${{ github.event_name }}"
            exit 0
          fi

          echo "Event: ${{ github.event_name }}, Branch: $BRANCH"

          # Skip main branch check suites
          if [ "$BRANCH" = "main" ]; then
            echo "Skipping main branch"
            exit 0
          fi

          # Find PR for this branch
          PR_JSON=$(gh pr list --head "$BRANCH" --json number,isDraft,author --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No PR found for branch $BRANCH"
            exit 0
          fi

          PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')

          echo "PR #$PR_NUM by $AUTHOR (draft=$IS_DRAFT)"

          # Only auto-merge Copilot PRs
          if [ "$AUTHOR" != "Copilot" ] && [ "$AUTHOR" != "copilot-swe-agent[bot]" ] && [ "$AUTHOR" != "app/copilot-swe-agent" ]; then
            echo "Not a Copilot PR (author=$AUTHOR), skipping"
            exit 0
          fi

          # Mark ready if still a draft
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Marking PR #$PR_NUM as ready..."
            gh pr ready "$PR_NUM"
          fi

          # Enable auto-merge (will merge once required checks pass)
          echo "Enabling auto-merge on PR #$PR_NUM..."
          gh pr merge "$PR_NUM" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
