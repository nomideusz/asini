name: CI — Typecheck & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    env:
      TURSO_DATABASE_URL: "libsql://dummy-ci.turso.io"
      TURSO_AUTH_TOKEN: "dummy-ci-token"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (dependency order)
        run: |
          pnpm --filter @nomideusz/svelte-calendar package
          pnpm --filter @nomideusz/svelte-scheduler package

      - name: Typecheck all packages
        run: pnpm -r check

      - name: Run tests
        run: pnpm -r test
