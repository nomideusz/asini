name: Chain Copilot Issues

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  assign-next:
    name: Assign Copilot to next issues
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.labels.*.name, 'copilot')

    steps:
      - name: Determine next issues
        id: next
        uses: actions/github-script@v7
        with:
          script: |
            // Simple chains: when issue N closes, assign these next immediately
            const simpleChain = {
              9:  [10, 11],  // Step 5 done → assign Steps 6 + 7 in parallel
            };

            // Gate chains: ALL listed issues must be closed before assigning targets
            const gateChain = [
              { requires: [10, 11], assigns: [19] },  // Steps 6+7 done → Step 8
            ];

            const closed = context.payload.issue.number;
            const next = [];

            // Check simple chains
            const simple = simpleChain[closed] || [];
            next.push(...simple);

            // Check gate chains — only fire if ALL prerequisites are closed
            for (const gate of gateChain) {
              if (!gate.requires.includes(closed)) continue;

              const others = gate.requires.filter(n => n !== closed);
              let allClosed = true;
              for (const num of others) {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                if (issue.state !== 'closed') {
                  allClosed = false;
                  console.log(`Gate blocked: #${num} is still ${issue.state}`);
                  break;
                }
              }
              if (allClosed) {
                next.push(...gate.assigns);
                console.log(`Gate passed: all of [${gate.requires}] closed → assigning [${gate.assigns}]`);
              }
            }

            core.setOutput('issues', JSON.stringify(next));
            console.log(`Issue #${closed} closed. Next issues: ${JSON.stringify(next)}`);

      - name: Assign Copilot to next issues
        if: fromJSON(steps.next.outputs.issues)[0] != null
        uses: actions/github-script@v7
        with:
          script: |
            const issues = ${{ steps.next.outputs.issues }};
            for (const num of issues) {
              console.log(`Assigning Copilot to issue #${num}...`);
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  assignees: ['Copilot'],
                });
                console.log(`✓ Assigned Copilot to #${num}`);
              } catch (err) {
                console.log(`✗ Failed to assign #${num}: ${err.message}`);
                // Fall back to commenting to trigger Copilot
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: `Issue #${context.payload.issue.number} (dependency) is now closed. @copilot please start working on this issue. Read the agent spec in \`.github/agents/\` for full instructions.`,
                });
                console.log(`  → Posted comment on #${num} instead`);
              }
            }
