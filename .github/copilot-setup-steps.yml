# Environment setup for GitHub Copilot coding agent
# This runs in a cloud VM before the agent starts working on an issue.
# Docs: https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent

setup:
  - name: Install Node.js 20
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install pnpm
    run: corepack enable && corepack prepare pnpm@10.12.1 --activate

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Build packages (calendar first, then scheduler)
    run: |
      pnpm --filter @nomideusz/svelte-calendar package
      pnpm --filter @nomideusz/svelte-scheduler build

  - name: Set dummy env vars for yoga app
    run: |
      echo "TURSO_DATABASE_URL=libsql://dummy-ci.turso.io" >> $GITHUB_ENV
      echo "TURSO_AUTH_TOKEN=dummy-ci-token" >> $GITHUB_ENV

  - name: Verify typecheck passes
    run: pnpm -r check
